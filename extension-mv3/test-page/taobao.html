<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>已买到的宝贝 — Taobao (test page)</title>
<style>
  body { font-family: system-ui, sans-serif; background:#f4f4f0; margin:0; padding:24px; }
  .bar { background:#fff; border-bottom:1px solid #e6e4de; padding:14px 20px; font-weight:700; color:#ff5000; margin:-24px -24px 20px; }
  .gd-order { background:#fff; border:1px solid #ece9e2; border-radius:10px; padding:14px 16px; display:flex; gap:14px; align-items:center; margin-bottom:12px; max-width:820px; }
  .thumb { width:54px; height:54px; border-radius:8px; background:repeating-linear-gradient(135deg,#e9e6df 0 8px,#f1efe9 8px 16px); flex:none; }
  .info { flex:1; }
  .gd-title { font-weight:600; }
  .meta { color:#888; font-size:13px; margin-top:4px; }
  .gd-price { color:#ff5000; font-weight:700; }
</style>
</head>
<!-- data-platform báo cho collector biết đây là sàn nào (trang thật suy ra từ host) -->
<body data-platform="taobao">
  <div class="bar">淘宝 · 已买到的宝贝</div>

  <div class="gd-order" data-gd-code="2901847561230011">
    <div class="thumb"></div>
    <div class="info">
      <div class="gd-title">Giày sneaker nữ da PU phong cách Hàn Quốc</div>
      <div class="meta">店铺: <span class="gd-shop">Nguyễn Thị Mai</span> · 数量 <span class="gd-qty">2</span></div>
    </div>
    <div class="gd-price">¥128.00</div>
  </div>

  <div class="gd-order" data-gd-code="2901847561230012">
    <div class="thumb"></div>
    <div class="info">
      <div class="gd-title">Tai nghe bluetooth TWS chống ồn</div>
      <div class="meta">店铺: <span class="gd-shop">Trần Văn Bình</span> · 数量 <span class="gd-qty">1</span></div>
    </div>
    <div class="gd-price">¥89.50</div>
  </div>

  <div class="gd-order" data-gd-code="2901847561230013">
    <div class="thumb"></div>
    <div class="info">
      <div class="gd-title">Túi xách thời trang nữ size lớn</div>
      <div class="meta">店铺: <span class="gd-shop">Lê Ngọc Trang</span> · 数量 <span class="gd-qty">1</span></div>
    </div>
    <div class="gd-price">¥215.00</div>
  </div>

  <div class="gd-order" data-gd-code="2901847561230014">
    <div class="thumb"></div>
    <div class="info">
      <div class="gd-title">Áo hoodie unisex nỉ bông dày</div>

    <div class="gd-price">¥75.00</div>
  </div>

  <!-- Trong extension thật, collector.js được tiêm tự động (content script).
       Ở đây nạp như script thường để lộ window.__gomdon cho việc kiểm thử. -->
  <script src="../content/collector.js"></script>
</body>
</html>
