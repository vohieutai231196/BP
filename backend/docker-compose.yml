# ============================================================
#  GomĐơn — chỉ 2 container: Web API (.NET 8) + PostgreSQL
#  (theo PRD: tối giản tài nguyên, không service phụ trợ)
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: gomdon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gomdon
      POSTGRES_USER: gomdon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gomdon}
    # KHÔNG expose 5432 ra ngoài — API nói chuyện với DB qua mạng nội bộ Docker.
    # Cần truy cập DB từ máy local? Bỏ comment dòng dưới (chỉ mở trên loopback):
    #   - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # auto-chạy schema khi volume còn trống
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomdon -d gomdon"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gomdon-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=gomdon;Username=gomdon;Password=${POSTGRES_PASSWORD:-gomdon}"
      Cors__Origins__0: "${CORS_ORIGIN:-http://localhost:5173}"
      Seed__DemoData: "false"
      # Secret nạp từ .env (không hardcode):
      Jwt__Key: "${JWT_KEY:?JWT_KEY chưa được đặt trong .env}"
      Ingest__Token: "${INGEST_TOKEN:?INGEST_TOKEN chưa được đặt trong .env}"
      # Dịch Trung→Việt bằng Gemini 2.5 Flash (để trống thì bỏ qua dịch):
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
      Gemini__Model: "gemini-2.5-flash"
    # KHÔNG publish 8080 ra ngoài — chỉ Caddy (mạng nội bộ) gọi tới.
    expose:
      - "8080"
    volumes:
      - ./logs:/app/logs

  # Reverse proxy + HTTPS tự động (Let's Encrypt). Nhận 80/443 → chuyển vào api:8080.
  caddy:
    image: caddy:2-alpine
    container_name: gomdon-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
